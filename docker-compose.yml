version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: creditpath_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-creditpath_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-creditpath_password}
      POSTGRES_DB: ${DB_NAME:-creditpath_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-creditpath_user} -d ${DB_NAME:-creditpath_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creditpath_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creditpath_backend
    environment:
      FASTAPI_ENV: ${FASTAPI_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      DATABASE_URL: postgresql://${DB_USER:-creditpath_user}:${DB_PASSWORD:-creditpath_password}@postgres:5432/${DB_NAME:-creditpath_db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - creditpath_network
    command: |
      sh -c "python -m uvicorn milestone5_api:app 
             --host 0.0.0.0 
             --port 8000 
             --reload"
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://backend:8000}
    container_name: creditpath_frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - creditpath_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  creditpath_network:
    driver: bridge
